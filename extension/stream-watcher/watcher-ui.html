<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stream Watcher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:     #0a0c10;
      --bg2:    #111318;
      --border: rgba(255,255,255,0.08);
      --text:   rgba(255,255,255,0.85);
      --dim:    rgba(255,255,255,0.35);
      --green:  #00e5a0;
      --red:    #ff4444;
      --yellow: #f5c400;
      --blue:   #38bfff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      font-size: 12px;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dim);
    }

    /* ── Status badge ── */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      padding: 3px 9px;
      border-radius: 20px;
      text-transform: uppercase;
    }

    .status-badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .status-badge.idle        { background: rgba(255,255,255,0.06); color: var(--dim); }
    .status-badge.idle::before { background: var(--dim); }

    .status-badge.connecting  { background: rgba(56,191,255,0.12); color: var(--blue); }
    .status-badge.connecting::before { background: var(--blue); animation: blink 1s ease-in-out infinite; }

    .status-badge.watching    { background: rgba(0,229,160,0.12); color: var(--green); }
    .status-badge.watching::before { background: var(--green); animation: blink 1.5s ease-in-out infinite; }

    .status-badge.error       { background: rgba(255,68,68,0.12); color: var(--red); }
    .status-badge.error::before { background: var(--red); }

    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* ── Idle hint ── */
    #idle-hint {
      padding: 16px 14px;
      font-size: 11px;
      color: var(--dim);
      line-height: 1.6;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #idle-hint.hidden { display: none; }

    /* ── Stop button bar ── */
    .toolbar {
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    button {
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      border: none;
      border-radius: 6px;
      padding: 7px 14px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:disabled { opacity: 0.35; cursor: not-allowed; }
    button:not(:disabled):hover { opacity: 0.85; }

    .btn-stop  { background: var(--red); color: #fff; }
    .btn-clear { background: rgba(255,255,255,0.08); color: var(--dim); }

    /* ── Event log ── */
    .log-header {
      padding: 8px 14px 6px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dim);
      flex-shrink: 0;
    }

    #event-log {
      flex: 1;
      overflow-y: auto;
      padding: 0 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #event-log::-webkit-scrollbar { width: 3px; }
    #event-log::-webkit-scrollbar-track { background: transparent; }
    #event-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .event-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
    }

    .event-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }

    .event-type-badge {
      font-size: 10px;
      font-weight: 600;
      background: rgba(56,191,255,0.12);
      color: var(--blue);
      padding: 2px 7px;
      border-radius: 4px;
      white-space: nowrap;
    }

    .event-confidence { font-size: 10px; font-weight: 600; color: var(--green); }
    .event-confidence.low { color: var(--yellow); }

    .event-timestamp {
      font-size: 10px;
      color: var(--dim);
      margin-left: auto;
      white-space: nowrap;
    }

    .event-description { font-size: 11px; color: var(--text); line-height: 1.5; }

    .log-system { font-size: 10px; color: var(--dim); font-style: italic; padding: 2px 2px; }
    .log-error  { font-size: 11px; color: var(--red); padding: 2px 2px; }
    .log-empty  { font-size: 11px; color: var(--dim); text-align: center; padding: 24px 0; }
  </style>
</head>
<body>

  <div class="header">
    <span class="header-title">👁 Stream Watcher</span>
    <span class="status-badge idle" id="status-badge">IDLE</span>
  </div>

  <div id="idle-hint">Navigate to a Twitch stream — monitoring starts automatically.</div>

  <div class="toolbar">
    <button class="btn-stop"  id="btn-stop"  disabled>■ Stop</button>
    <button class="btn-clear" id="btn-clear">Clear</button>
  </div>

  <div class="log-header">Event Log</div>
  <div id="event-log">
    <div class="log-empty" id="log-empty">No events yet.</div>
  </div>

  <script type="module" src="watcher-ui.js"></script>
</body>
</html>
